[pytest]
addopts =
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
